# Stack de PRODUÇÃO do Sellergy Cloud.
#
# Diferenças pro docker-compose.yml (dev):
#  - sem bind-mount do código (a imagem é imutável) e sem nodemon/vite dev-server;
#  - front buildado e servido por nginx (Dockerfile.prod);
#  - backend roda `prisma migrate deploy` e `npm start` (não `dev`);
#  - Postgres/Redis/MinIO NÃO expõem portas pra internet (só a rede interna) —
#    segurança: o banco não fica acessível de fora;
#  - sem pgadmin nem ngrok (ferramentas de dev).
#
# Uso:  docker compose -f docker-compose.prod.yml up -d --build
# TLS/HTTPS: ponha um reverse proxy (Caddy/Traefik/nginx) na frente — ver DEPLOY.md.

name: sellergy_cloud_prod

services:
  postgres:
    image: postgres:16-alpine
    container_name: sellergy_cloud_prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sellergy_cloud-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sellergy_cloud_prod-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - sellergy_cloud-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: sellergy_cloud_prod-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - sellergy_cloud-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Pra as imagens (URLs assinadas) carregarem no navegador, exponha o MinIO
    # por um proxy público e aponte MINIO_ENDPOINT pra essa URL. Ver DEPLOY.md.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sellergy_cloud_prod-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      # Dentro do Docker o backend fala com o MinIO pelo nome do servico.
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "${BACKEND_PORT}:3333"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sellergy_cloud-network
    # Aplica migrações pendentes e sobe a API (produção, sem nodemon).
    command: sh -c "npx prisma migrate deploy && npm start"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sellergy_cloud_prod-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      # Dentro do Docker o backend fala com o MinIO pelo nome do servico.
      MINIO_ENDPOINT: http://minio:9000
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sellergy_cloud-network
    command: node src/worker.js

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_URL_PUBLICA: ${VITE_URL_PUBLICA}
    container_name: sellergy_cloud_prod-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - sellergy_cloud-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sellergy_cloud-network:
    driver: bridge
