# Nginx de produção do front (SPA React + Vite). Serve o build estático de
# /usr/share/nginx/html e faz o fallback de rota pro index.html (React Router).
# A API é acessada pela VITE_API_URL embutida no build (ver Dockerfile.prod).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressão
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml font/woff2;

    # Cabeçalhos de segurança básicos (a app já usa tokens no header, sem cookie de sessão)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Assets com hash no nome: cache longo e imutável
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Healthcheck simples
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # SPA: qualquer rota desconhecida volta pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
