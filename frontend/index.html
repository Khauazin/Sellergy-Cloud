<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sellergy Cloud — Painel de Controle</title>

    <!-- Desabilita extensoes que injetam overlay (Grammarly, LanguageTool, etc.) -->
    <meta name="grammarly" content="false" />
    <meta name="LanguageTool" content="false" />
    <meta name="editor-extensions" content="false" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Anti-flash: aplica o tema antes do React carregar -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('sellergy-ui-storage');
          var parsed = stored ? JSON.parse(stored) : null;
          var theme = parsed?.state?.theme ?? 'light';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0A0A0A';
          } else {
            document.documentElement.style.backgroundColor = '#FAFAF7';
          }
        } catch (e) {
          document.documentElement.style.backgroundColor = '#FAFAF7';
        }
      })();
    </script>
  </head>
  <body data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
